<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroTrace | Script Protection</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #050507; --bg-card: rgba(10, 10, 12, 0.85); --bg-input: #141419;
            --border: #222228; --accent: #00d4ff; --accent-glow: rgba(0, 212, 255, 0.4);
            --text-main: #e4e4e7; --text-muted: #71717a; --success: #00ff88; --danger: #ff0055;
            --gradient-main: linear-gradient(135deg, #00d4ff, #00ff88);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            font-family: 'Outfit', sans-serif; 
            min-height: 100vh; 
            overflow-x: hidden;
            position: relative;
        }

        /* Background Animation */
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 0%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 40%);
            animation: bgPulse 10s ease-in-out infinite alternate;
        }
        @keyframes bgPulse { from { opacity: 0.5; } to { opacity: 1; } }

        .container {
            width: 100%; max-width: 550px; margin: 0 auto; padding: 40px 20px;
            display: flex; flex-direction: column; justify-content: center; min-height: 100vh;
            position: relative; z-index: 10;
        }

        /* Header */
        .header { text-align: center; margin-bottom: 40px; position: relative; }
        .logo-wrapper { position: relative; display: inline-block; margin-bottom: 15px; }
        .logo-bg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; background: var(--accent-glow);
            border-radius: 50%; filter: blur(40px); opacity: 0.4; animation: pulse 3s ease-in-out infinite;
        }
        /* ICON </>
        .logo-icon {
            font-size: 3rem; font-weight: 300; color: white; position: relative; z-index: 2;
            text-shadow: 0 0 20px var(--accent); letter-spacing: -2px;
            animation: logoEntry 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0; transform: scale(0.5);
        }
        @keyframes logoEntry { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulse { 0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); } }
        
        .title {
            font-size: 2.2rem; font-weight: 800; letter-spacing: -1px;
            background: var(--gradient-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px; opacity: 0; animation: slideUp 0.6s ease forwards 0.2s;
        }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; opacity: 0; animation: slideUp 0.6s ease forwards 0.3s; }

        /* Card */
        .card {
            background: var(--bg-card); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px; padding: 30px; backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative; overflow: hidden;
            opacity: 0; animation: slideUp 0.6s ease forwards 0.4s;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        /* Input */
        .input-group { margin-bottom: 20px; position: relative; }
        .form-label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; color: var(--text-muted); letter-spacing: 0.5px; }
        .form-control {
            width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border);
            border-radius: 10px; padding: 14px 18px; color: var(--text-main);
            font-family: 'Outfit', sans-serif; font-size: 0.95rem;
            transition: all 0.3s ease; outline: none;
        }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1); background: rgba(0,0,0,0.5); }
        textarea.form-control { min-height: 150px; resize: vertical; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }

        /* Button */
        .btn-submit {
            width: 100%; background: var(--gradient-main); border: none;
            border-radius: 10px; padding: 16px; color: #000; font-weight: 700;
            font-size: 1rem; cursor: pointer; position: relative; overflow: hidden;
            transition: all 0.3s ease; box-shadow: 0 10px 20px rgba(0, 212, 255, 0.2);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0, 212, 255, 0.3); }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        /* Result */
        .result-box {
            background: rgba(0, 0, 0, 0.5); border: 1px solid var(--border);
            border-radius: 10px; padding: 20px; margin-top: 20px; position: relative;
            border-left: 3px solid var(--success); display: none;
        }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .result-title { color: var(--success); font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .btn-copy {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 6px; color: var(--text-muted); cursor: pointer;
            font-size: 0.75rem; font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 5px;
        }
        .btn-copy:hover { border-color: var(--accent); color: var(--accent); background: rgba(255,255,255,0.1); }
        .result-code {
            font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--accent);
            background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px;
            word-break: break-all; line-height: 1.6;
        }

        /* Footer */
        .footer-info {
            text-align: center; margin-top: 30px; font-size: 0.75rem; color: var(--text-muted);
            opacity: 0; animation: fadeIn 0.6s ease forwards 0.6s;
        }
        .footer-info i { color: var(--danger); margin-right: 4px; }

        /* Alert */
        .alert {
            padding: 14px; border-radius: 10px; margin-bottom: 20px; font-size: 0.85rem;
            display: none; align-items: center; gap: 10px; animation: slideDown 0.3s ease;
        }
        .alert.err { background: rgba(255, 0, 85, 0.1); border: 1px solid rgba(255, 0, 85, 0.2); color: var(--danger); }
        .alert.suc { background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.2); color: var(--success); }

        /* Keyframes */
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <div class="container">
        <div class="header">
            <div class="logo-wrapper">
                <div class="logo-bg"></div>
                <!-- ICON </> -->
                <div class="logo-icon">&lt;/&gt;</div>
            </div>
            <div class="title">ZeroTrace</div>
            <div class="subtitle">Keyless Intermediate Protection</div>
        </div>

        <div id="alert" class="alert"></div>

        <div class="card">
            <div class="input-group">
                <label class="form-label">LUA SCRIPT INPUT</label>
                <textarea id="script" class="form-control" placeholder="print('Hello World')"></textarea>
            </div>

            <button id="submitBtn" class="btn-submit" onclick="generate()">
                <i class="fas fa-bolt"></i> PROTECT SCRIPT
            </button>

            <div id="resultBox" class="result-box">
                <div class="result-header">
                    <span class="result-title"><i class="fas fa-check-circle"></i> SUCCESS</span>
                    <button class="btn-copy" onclick="copy()"><i class="fas fa-copy"></i> COPY</button>
                </div>
                <div id="resultText" class="result-code"></div>
            </div>
        </div>

        <div class="footer-info">
            <i class="fas fa-terminal"></i> If error, type /console in Roblox chat to debug.
        </div>
    </div>

    <script>
        function showAlert(type, msg) {
            const el = document.getElementById('alert');
            el.className = 'alert ' + type;
            el.innerHTML = `<i class="fas fa-${type === 'suc' ? 'check' : 'exclamation'}-circle"></i> ${msg}`;
            el.style.display = 'flex';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        function copy() {
            const text = document.getElementById('resultText').innerText;
            navigator.clipboard.writeText(text);
            showAlert('suc', 'Copied to clipboard!');
        }

        async function generate() {
            const script = document.getElementById('script').value;
            if (!script) return showAlert('err', 'Script cannot be empty!');

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner spinner"></i> PROCESSING...';

            try {
                const res = await fetch('/api/script', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ script })
                });
                
                const data = await res.json();

                if (data.id) {
                    const host = window.location.host;
                    // Output langsung 1 baris
                    const output = `loadstring(game:HttpGet("https://${host}/api/script?id=${data.id}"))()`;

                    document.getElementById('resultText').innerText = output;
                    document.getElementById('resultBox').style.display = 'block';
                    showAlert('suc', 'Script protected successfully!');
                } else {
                    showAlert('err', data.error || 'Failed to protect.');
                }
            } catch (e) {
                showAlert('err', 'Server connection failed.');
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-bolt"></i> PROTECT SCRIPT';
        }
    </script>
</body>
</html>
